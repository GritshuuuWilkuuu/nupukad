                question: "Paberil on kirjas arv 6. Kuidas saab sellest arvust teha arvu 9 ilma midagi juurde kirjutamata ja kustutamata?",
                options: ["Pöörata paber tagurpidi", "Lõigata paber pooleks", "Värvida see üle", "Seda ei saa teha"], correct: 0,
                rationale: "If pöörad numbri 6 sisaldava paberi tagurpidi, saab sellest täpselt number 9."
            },
            {
                question: "Puu otsas oli 12 õuna. Juku raputas puud ja maapinnale kukkus 5 õuna. Mitu õuna jäi puu otsa alles?",
                options: ["5 õuna", "6 õuna", "7 õuna", "8 õuna"], correct: 2,
                rationale: "Teeme lahutamistehte: 12 - 5 = 7 õuna."
            },
            {
                question: "Klassis pandi ritta 3 lauda. Iga laua taha pandi 2 tooli. Mitu tooli pandi laua taha kokku?",
                options: ["4 tooli", "5 tooli", "6 tooli", "8 tooli"], correct: 2,
                rationale: "Kolme laua taga on kokku toolide arv: 2 + 2 + 2 = 6 tooli."
            },
            {
                question: "Sinu ees on pikk nöör. Kui teed sellesse nööri sisse 3 sõlme, mitmeks tükiks nöör jaguneb?",
                options: ["Nöör jääb üheks tükiks", "2 tükiks", "3 tükiks", "4 tükiks"], correct: 0,
                rationale: "Sõlmede tegemine ei lõika nööri katki, nöör jääb ikka üheks pikaks tervikuks paberil."
            },
            {
                question: "Karbis on sinised ja rohelised pliiatsid. Siniseid on 4 ja rohelisi on poole vähem. Mitu pliiatsit on karbis kokku?",
                options: ["5 pliiatsit", "6 pliiatsit", "7 pliiatsit", "8 pliiatsit"], correct: 1,
                rationale: "Rohelisi on 4 pool ehk 2 pliiatsit. Kokku on karbis seega 4 + 2 = 6 pliiatsit."
            },
            {
                question: "Koolitund algab kell 8. Tund kestab täpselt 1 tunni. Mis kell tund lõppeb?",
                options: ["Kell 8", "Kell 9", "Kell 10", "Kell 11"], correct: 1,
                rationale: "Liidame alguskellajale ühe tunni juurde: 8 + 1 = 9."
            },
            {
                question: "Kati kogub kleepse. Tal on 10 kleepsu kassidest ja 5 kleepsu koertest. Mitu kleepsu on Katil kokku?",
                options: ["12 kleepsu", "14 kleepsu", "15 kleepsu", "20 kleepsu"], correct: 2,
                rationale: "Liidame kleepsud kokku: 10 + 5 = 15 kleepsu."
            },
            {
                question: "Laual on 14 pirni. 4 pirni on veel toored ja ülejäänud on küpsed. Mitu küpset pirni on laual?",
                options: ["8 pirni", "10 pirni", "12 pirni", "18 pirni"], correct: 1,
                rationale: "Lahutame koguarvust toored pirnid: 14 - 4 = 10 küpset pirni."
            },
            {
                question: "Mis on kõige väiksem kahekohaline arv matemaatikas?",
                options: ["1", "9", "10", "11"], correct: 2,
                rationale: "Esimene ja kõige väiksem arv, mille kirjutamiseks läheb vaja kahte numbrit, on arv 10."
            },
            {
                question: "Riiulil oli 16 raamatut. 6 raamatut võeti sealt ära lugemiseks. Mitu raamatut jäi riiulile?",
                options: ["8 raamatut", "10 raamatut", "12 raamatut", "20 raamatut"], correct: 1,
                rationale: "Teeme lahutamistehte: 16 - 6 = 10 raamatut."
            }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        // Funktsioon massiivi segamiseks (Fisher-Yates algoritm)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Alusta uut mängu
        function startQuiz() {
            // Segatakse kõik 100 küsimust ja võetakse esimesed 10
            const shuffled = shuffleArray([...allQuestions]);
            currentQuestions = shuffled.slice(0, 10);
            
            currentQuestionIndex = 0;
            score = 0;
            hasAnswered = false;
            
            // Vahetatakse vaateid
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            
            updateScoreDisplay();
            showQuestion();
        }

        // Uuenda skoori kuvamist
        function updateScoreDisplay() {
            document.getElementById('score-text').innerText = `Skoor: ${score}`;
        }

        // Kuva praegune küsimus
        function showQuestion() {
            hasAnswered = false;
            document.getElementById('feedback-container').classList.add('hidden');
            
            const qData = currentQuestions[currentQuestionIndex];
            
            // Uuenda tekstid ja progressiriba
            document.getElementById('progress-text').innerText = `Küsimus ${currentQuestionIndex + 1}/10`;
            document.getElementById('question-text').innerText = qData.question;
            
            const progressPercent = ((currentQuestionIndex + 1) / 10) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            
            // Genereeri vastusevariandid (ja sega ka valikud ära, et õige vastus poleks alati samal kohal)
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // Loome massiivi objektidest, et säilitada algne indeks
            let mappedOptions = qData.options.map((opt, idx) => ({ text: opt, isCorrect: idx === qData.correct }));
            // Segame valikud ära
            mappedOptions = shuffleArray(mappedOptions);
            
            mappedOptions.forEach((option) => {
                const button = document.createElement('button');
                button.innerText = option.text;
                button.className = "w-full text-left bg-gray-50 hover:bg-indigo-50 border-2 border-gray-200 text-gray-700 font-medium py-4 px-6 rounded-2xl transition shadow-sm active:scale-[0.98] focus:outline-none text-lg";
                button.onclick = () => handleAnswer(option.isCorrect, button, mappedOptions);
                optionsContainer.appendChild(button);
            });
        }

        // Vastuse valimine
        function handleAnswer(isCorrect, clickedButton, mappedOptions) {
            if (hasAnswered) return; // Takistab mitu korda klikkimist
            hasAnswered = true;
            
            const qData = currentQuestions[currentQuestionIndex];
            const optionsContainer = document.getElementById('options-container');
            const buttons = optionsContainer.getElementsByTagName('button');
            
            if (isCorrect) {
                score++;
                updateScoreDisplay();
                clickedButton.classList.remove('bg-gray-50', 'hover:bg-indigo-50', 'border-gray-200');
                clickedButton.classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-900', 'font-bold');
                
                showFeedback(true, "Õige vastus! 🎉", qData.rationale);
            } else {
                clickedButton.classList.remove('bg-gray-50', 'hover:bg-indigo-50', 'border-gray-200');
                clickedButton.classList.add('bg-red-100', 'border-red-500', 'text-red-900', 'font-bold');
                
                // Otsi ja märgi roheliseks see nupp, mis oli tegelikult õige
                mappedOptions.forEach((opt, idx) => {
                    if (opt.isCorrect) {
                        buttons[idx].classList.remove('bg-gray-50', 'border-gray-200');
                        buttons[idx].classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-900', 'font-bold');
                    }
                });
                
                showFeedback(false, "Oi, seekord läks valesti! 🤔", qData.rationale);
            }

            // Muuda ülejäänud nupud mitteaktiivseks
            for (let btn of buttons) {
                btn.disabled = true;
                if (!btn.classList.contains('border-emerald-500') && !btn.classList.contains('border-red-500')) {
                    btn.classList.add('opacity-50');
                }
            }
        }

        // Kuva tagasiside kastike
        function showFeedback(isCorrect, title, rationale) {
            const container = document.getElementById('feedback-container');
            const iconSpan = document.getElementById('feedback-icon');
            const titleH3 = document.getElementById('feedback-title');
            const rationaleP = document.getElementById('rationale-text');
            const nextBtn = document.getElementById('next-btn');
            
            container.classList.remove('hidden');
            titleH3.innerText = title;
            rationaleP.innerText = rationale;
            
            if (isCorrect) {
                container.className = "bg-emerald-50 rounded-2xl p-4 border-2 border-dashed border-emerald-300 mb-6";
                iconSpan.innerText = "⭐";
                titleH3.className = "font-bold text-lg text-emerald-800";
            } else {
                container.className = "bg-amber-50 rounded-2xl p-4 border-2 border-dashed border-amber-300 mb-6";
                iconSpan.innerText = "💡";
                titleH3.className = "font-bold text-lg text-amber-800";
            }
            
            if (currentQuestionIndex === 9) {
                nextBtn.innerText = "Vaata tulemust 🏁";
            } else {
                nextBtn.innerText = "Järgmine küsimus →";
            }
        }

        // Järgmise küsimuse nupp
        document.getElementById('next-btn').onclick = function() {
            currentQuestionIndex++;
            if (currentQuestionIndex < 10) {
                showQuestion();
            } else {
                showResults();
            }
        };

        // Näita lõpuekraani
        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            
            document.getElementById('final-score-text').innerText = `Sinu tulemus: ${score} / 10`;
            
            const msgP = document.getElementById('feedback-message');
            if (score === 10) {
                msgP.innerText = "Täiesti uskumatu! Sa lahendasid kõik nupukad ülesanded õigesti. Oled suurepärane loogiline mõtleja! 🥇";
            } else if (score >= 7) {
                msgP.innerText = "Väga tubli! Lugesid küsimusi hoolega ja hammustasid peaaegu kõik pähklid katki! 🌟";
            } else if (score >= 4) {
                msgP.innerText = "Hea tulemus! Mõned küsimused olid päris kavalate krutsifiksidega. Proovi uuesti uute ülesannetega! 🚀";
            } else {
                msgP.innerText = "Harjutamine teeb meistriks! Need ülesanded püüdsidki sind tähelepanuga haneks tõmmata. Proovi uuesti ja ole veelgi täpsem! 💪";
            }
        }

        // Alusta uuesti nupp
        document.getElementById('restart-btn').onclick = startQuiz;

        // Käivita rakendus esimesel laadimisel
        window.onload = startQuiz;
    </script>
</body>
</html>
